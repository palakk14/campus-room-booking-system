<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register – Campus Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #198754, #20c997);
}
.register-box {
  width: 460px;
  background: white;
  padding: 44px 40px;
  border-radius: 22px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}
.register-box h2 { font-weight: 700; color: #1a1a2e; }
.form-control:focus { border-color: #198754; box-shadow: 0 0 0 3px rgba(25,135,84,.15); }
.btn-register { background: linear-gradient(135deg,#198754,#20c997); border: none; border-radius: 10px; font-weight: 600; }
.pw-hint { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<div class="register-box">
  <h2 class="text-center mb-1">Create Account</h2>
  <p class="text-center text-muted mb-4">Campus Room Booking System</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-danger py-2">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="mb-3">
      <label class="form-label fw-semibold">Full Name</label>
      <input type="text" name="name" class="form-control" placeholder="Jane Smith" required>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@university.edu" required>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      <p class="pw-hint">Min 8 characters · 1 uppercase letter · 1 number</p>
    </div>

    <button type="submit" class="btn btn-register btn-success w-100 py-2">Create Account</button>
  </form>

  <p class="text-center mt-3 mb-0">
    Already have an account? <a href="/login" class="text-success fw-semibold">Login</a>
  </p>
</div>
</body>
</html>
