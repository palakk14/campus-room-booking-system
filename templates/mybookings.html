<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">My Bookings</h1>

<table class="table table-bordered shadow bg-white">
<tr>
<th>Room</th>
<th>Date</th>
<th>Start</th>
<th>End</th>
<th>Purpose</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for b in bookings %}
<tr>
<td>{{ b.room_name }}</td>
<td>{{ b.date }}</td>
<td>{{ b.start_time }}</td>
<td>{{ b.end_time }}</td>
<td>{{ b.purpose }}</td>
<td>{{ b.status }}</td>

<td>
<a href="/cancel/{{ b.booking_id }}"
class="btn btn-danger btn-sm">
Cancel
</a>
</td>
</tr>
{% endfor %}

</table>

<a href="/rooms" class="btn btn-primary">Book More Rooms</a>

</div>

</body>
</html>
