<!DOCTYPE html>
<html>
<head>
<title>Book Room</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<a href="/dashboard" class="btn btn-secondary">
Back to Dashboard
</a>

<body class="bg-light">

<div class="container mt-5" style="max-width:600px;">

<h1 class="mb-4">Book Room {{ room_id }}</h1>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div id="flash-box" class="alert alert-danger">
      {{ messages[0] }}
    </div>

    <script>
      setTimeout(function() {
        let box = document.getElementById("flash-box");
        if (box) {
          box.style.transition = "0.5s";
          box.style.opacity = "0";
          setTimeout(() => box.remove(), 500);
        }
      }, 2500);
    </script>
  {% endif %}
{% endwith %}

<form method="POST" class="card p-4 shadow bg-white">

<div class="mb-3">
<label>Date</label>
<input type="date" name="date" class="form-control" required>
</div>

<div class="mb-3">
<label>Start Time</label>
<input type="time" name="start_time" class="form-control" required>
</div>

<div class="mb-3">
<label>End Time</label>
<input type="time" name="end_time" class="form-control" required>
</div>

<div class="mb-3">
<label>Purpose</label>
<input type="text" name="purpose" class="form-control" placeholder="Purpose" required>
</div>

<button type="submit" class="btn btn-primary w-100">
Confirm Booking
</button>

</form>

</div>

</body>
</html>
