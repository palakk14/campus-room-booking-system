<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Campus Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0d6efd, #6610f2);
}
.login-box {
  width: 430px;
  background: white;
  padding: 44px 40px;
  border-radius: 22px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}
.login-box h2 { font-weight: 700; color: #1a1a2e; }
.form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.15); }
.btn-login { background: linear-gradient(135deg,#0d6efd,#6610f2); border: none; border-radius: 10px; font-weight: 600; }
.btn-login:hover { opacity: .9; }
</style>
</head>
<body>
<div class="login-box">
  <h2 class="text-center mb-1">Welcome Back</h2>
  <p class="text-center text-muted mb-4">Campus Room Booking System</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-danger py-2">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@university.edu" required>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn btn-login btn-primary w-100 py-2">Login</button>
  </form>

  <p class="text-center mt-3 mb-0">
    Don't have an account? <a href="/register" class="text-primary fw-semibold">Register</a>
  </p>
</div>
</body>
</html>
